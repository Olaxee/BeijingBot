<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Rules</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    html { zoom: 150%; }

    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: auto;
      padding: 20px;
      transition: background-color 0.35s ease, color 0.35s ease;
    }

    body.dark { background: #0f0f0f; color: white; }
    body.light { background: #ffffff; color: #111; }
    body.amoled { background: #000000; color: #ffffff; }

    .sync-status {
      position: fixed;
      top: 15px;
      left: 15px;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
      border: 2px solid currentColor;
    }

    .synced { color: #4caf50; border-color: #4caf50; }
    .updating { color: #ffb300; border-color: #ffb300; }
    .outdated { color: #ff4e4e; border-color: #ff4e4e; }
  </style>
</head>

<body class="dark">

<div id="syncStatus" class="sync-status">⏳ LOADING...</div>
<div id="content">Chargement...</div>

<script>
const TOKEN = "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";
const API_URL = "https://api.github.com/repos/Olaxee/BeijingDiscord/contents/Rules/Rules.md";

let lastSha = null;

const statusEl = document.getElementById("syncStatus");
const contentEl = document.getElementById("content");

function setStatus(type, text) {
  statusEl.className = "sync-status " + type;
  statusEl.textContent = text;
}

// ✅ decode base64 CORRECT UTF-8
function decodeBase64UTF8(str) {
  const bytes = Uint8Array.from(atob(str), c => c.charCodeAt(0));
  return new TextDecoder("utf-8").decode(bytes);
}

async function syncFile() {
  try {
    setStatus("", "⏳ CHECK...");

    const res = await fetch(API_URL, {
      headers: {
        "Authorization": "token " + TOKEN,
        "Accept": "application/vnd.github+json"
      }
    });

    const data = await res.json();

    // 🔥 DEBUG important
    if (!res.ok) {
      console.error("API ERROR:", data);
      throw new Error(data.message || "API error");
    }

    if (!data.content) {
      console.error("NO CONTENT:", data);
      throw new Error("No content field");
    }

    const newSha = data.sha;

    // premier load
    if (!lastSha) {
      const md = decodeBase64UTF8(data.content);
      contentEl.innerHTML = marked.parse(md);
      lastSha = newSha;
      setStatus("synced", "🟢 SYNCED");
      return;
    }

    // nouveau commit
    if (newSha !== lastSha) {
      setStatus("updating", "🟡 UPDATING...");

      const md = decodeBase64UTF8(data.content);
      contentEl.innerHTML = marked.parse(md);

      lastSha = newSha;

      setStatus("synced", "🟢 SYNCED");
    } else {
      setStatus("synced", "🟢 SYNCED");
    }

  } catch (e) {
    console.error("SYNC ERROR:", e);
    setStatus("outdated", "🔴 OUTDATED");
  }
}

syncFile();
setInterval(syncFile, 5000);
</script>

</body>
</html>
