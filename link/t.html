<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Copier</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f0f0f;
      font-family: Arial, sans-serif;
    }

    button {
      padding: 18px 34px;

      border-radius: 999px;

      background: #00a62c;
      border: 2px solid #1bf254;

      color: white;
      font-size: 18px;
      font-weight: bold;
      font-family: Arial, sans-serif;

      cursor: pointer;
      transition: 0.15s;
    }

    button:hover {
      filter: brightness(1.1);
      transform: scale(1.04);
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>

<button onclick="copyAndExit()">Copier</button>

<script>
  async function copyAndExit() {
    const text = "discord.gg/8xBBW975VX";

    try {
      await navigator.clipboard.writeText(text);
    } catch (e) {
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      ta.remove();
    }

    window.close();

    setTimeout(() => {
      history.back();
    }, 300);
  }
</script>

</body>
</html>
